<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PassVault Pro</title>
    <meta name="description" content="Local password manager. Zero cloud. Zero tracking. Your passwords stay on your device." />
    <link rel="icon" href="/passvault-pro/icon-192.png" />
    <link rel="manifest" href="/passvault-pro/manifest.json" />
    <meta name="theme-color" content="#1e40af" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/passvault-pro/sw.js', { scope: '/passvault-pro/' });
      });
    }
  </script>
</body>
</html>
